version: "3.8"

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: oficina_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://root:@db:3306/oficina_db"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-super-secret-change-me}"
      NEXTAUTH_URL: "http://localhost:3000"
      AUTH_SECRET: "${AUTH_SECRET:-super-secret-change-me}"
      AUTH_URL: "http://localhost:3000"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
